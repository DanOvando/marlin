articles:
- title: "Getting Started"
  navbar: ~
  contents:
  - getting-started

- title: "Fleet Behavior"
  desc: >
    How fishing fleets decide where and how hard to fish.
  contents:
  - articles/spatial-allocation
  - articles/port-distance
  - articles/fleet-management
  - articles/manual_fleets
  - articles/objective_function

- title: "Species Biology"
  desc: >
    Parameterizing species movement, habitat, selectivity, and recruitment.
  contents:
  - articles/movement-rates
  - articles/dynamic-habitat
  - articles/Setting-Selectivity
  - articles/Working-with-Recruitment-Deviates
  - articles/recruitment-dynamics
  - articles/Invertebrates

- title: "Simulation Setup"
  desc: >
    Configuring and calibrating the simulation grid and movement parameters.
  contents:
  - articles/rectifier
  - articles/big-seas

- title: "Analysis & Applications"
  desc: >
    Using marlin for management strategy evaluation and spatial analysis.
  contents:
  - articles/MSE
  - articles/measure_gradients
  - articles/Comparing-marlin-to-other-spatial-simulation-and-planning-models

- title: "Other"
  contents:
  - starts_with("")
